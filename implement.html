<!DOCTYPE html>
<html>
<head>
    <title>NetSync - Daily Logs</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f9f9f9; margin: 0; }
        .header { background-color: #0a0b1e; color: white; padding: 10px 50px; display: flex; align-items: center; justify-content: space-between; }
        .brand-container { display: flex; align-items: center; gap: 15px; text-decoration: none; color: white; }
        .system-logo { height: 45px; border-radius: 5px; }
        .container { padding: 30px 15%; }
        .back-link { text-decoration: none; color: #5d87ff; font-weight: bold; float: right; }
        .log-card { background: white; padding: 30px; border-radius: 12px; border: 1px solid #eee; margin-bottom: 40px; }
        textarea { width: 100%; height: 120px; padding: 15px; border-radius: 8px; border: 1px solid #eee; background: #f4f7f6; margin-bottom: 15px; box-sizing: border-box; font-family: inherit; }
        .btn-post { background: #388e3c; color: white; border: none; padding: 12px 40px; border-radius: 8px; font-weight: bold; cursor: pointer; display: block; margin: 0 auto; }
        .timeline { position: relative; padding-left: 40px; margin-top: 30px; }
        .timeline::before { content: ''; position: absolute; left: 7px; top: 0; bottom: 0; width: 4px; background: #2176ff; border-radius: 2px; }
        .entry { position: relative; background: white; padding: 25px; border-radius: 12px; border: 1px solid #eee; margin-bottom: 30px; }
        .dot { position: absolute; left: -42px; top: 25px; width: 18px; height: 18px; background: #2176ff; border: 4px solid white; border-radius: 50%; }
        .meta { color: #777; font-size: 14px; margin-bottom: 10px; }
        .log-img { width: 100%; max-width: 450px; border-radius: 12px; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="header">
        <a href="/" class="brand-container">
            <img src="{{ url_for('static', filename='uploads/icons/netsync.jpg') }}" class="system-logo">
            <div style="font-size: 24px; font-weight: bold;">NetSync</div>
        </a>
    </div>
    <div class="container">
        <a href="/" class="back-link">Back to Dashboard</a>
        <h1>Daily Log</h1>
        <div class="log-card">
            <form action="{{ url_for('add_log', project_id=project.id) }}" method="POST" enctype="multipart/form-data">
                <textarea name="description" placeholder="Describe today's progress..." required></textarea>
                <label style="font-weight:bold;">Attach Progress Photo:</label><br>
                <input type="file" name="log_photo" style="margin-top:10px;"><br><br>
                <button type="submit" class="btn-post">Post Daily Log</button>
            </form>
        </div>
        <div class="timeline">
            {% for log in project.logs|sort(attribute='created_at', reverse=True) %}
            <div class="entry">
                <div class="dot"></div>
                <div class="meta"><strong>Field Engineer</strong> • {{ log.created_at.strftime('%B %d, %Y - %I:%M %p') }}</div>
                <div>{{ log.description }}</div>
                {% if log.log_photo %}<img src="{{ url_for('static', filename='uploads/' + log.log_photo) }}" class="log-img">{% endif %}
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
