<!DOCTYPE html>
<html>
<head>
    <title>NetSync - New Survey</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; }
        .header { background-color: #0a0b1e; color: white; padding: 10px 50px; display: flex; align-items: center; }
        .brand-container { display: flex; align-items: center; gap: 15px; text-decoration: none; color: white; }
        .system-logo { height: 45px; border-radius: 5px; }
        .card { background: white; padding: 40px; border-radius: 15px; width: 450px; margin: 50px auto; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h1 { margin-top: 0; font-size: 24px; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #000; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <a href="/" class="brand-container">
            <img src="{{ url_for('static', filename='uploads/icons/netsync.jpg') }}" class="system-logo">
            <div style="font-size: 24px; font-weight: bold;">NetSync</div>
        </a>
    </div>
    <div class="card">
        <h1>New Project Survey</h1>
        <form action="/create-project" method="POST" enctype="multipart/form-data">
            <input type="text" name="site_name" placeholder="Project Site Name" required>
            <input type="text" name="location" placeholder="Full Address / Location" required>
            <label style="font-size: 14px; font-weight: bold; display: block; margin-bottom: 8px;">Site Photo</label>
            <input type="file" name="site_photo" required>
            <button type="submit">Submit Survey</button>
        </form>
    </div>
</body>
</html>
